        .btn-down { background: #0066cc; color: #fff; display: block; padding: 14px; text-align: center; text-decoration: none; font-weight: bold; margin-top: 8px; border-radius: 4px; border-bottom: 3px solid #004488; }
        
        .screen-scroll { white-space: nowrap; overflow-x: auto; margin: 10px 0; padding-bottom: 5px; }
        .screen-scroll img { height: 140px; border: 1px solid #444; margin-right: 8px; border-radius: 4px; }
        .info-box { background: #111; padding: 12px; border: 1px solid #222; font-size: 13px; line-height: 1.4; border-radius: 4px; }

    var root = document.getElementById('app-root');

    function getParam(name) {
        var s = window.location.search.substring(1).split("&");
        for (var i = 0; i < s.length; i++) {
            var p = s[i].split("=");
            if (p[0] == name) return p[1];
        }
        return false;
    }

    function renderDetails(id) {
        var a = null;
        for (var i = 0; i < appsData.length; i++) {
            if (appsData[i].id == id) { a = appsData[i]; break; }
        }

        if (!a) { 
            root.innerHTML = 'Не найдено. <a href="index.html">Назад</a>';
            return;
        }

        var sHtml = '';
        if (a.screenshots && a.screenshots.length > 0) {
            sHtml += '<div class="screen-scroll">';
            for (var j = 0; j < a.screenshots.length; j++) {
                sHtml += '<img src="' + a.screenshots[j] + '">';
            }
            sHtml += '</div>';
        }

        var bHtml = '';
        for (var label in a.downloads) {
            bHtml += '<a href="' + a.downloads[label] + '" class="btn-down">' + label + '</a>';
        }

        root.innerHTML = 
            '<a href="blackberry.html" class="btn-back">← Назад</a>' +
            '<div style="display:table; width:100%; margin-bottom:10px;">' +
                '<div style="display:table-cell; width:60px; vertical-align:middle;">' +
                    '<img src="' + a.icon + '" width="54" height="54">' +
                '</div>' +
                '<div style="display:table-cell; vertical-align:middle; padding-left:10px;">' +
                    '<h2 style="margin:0; font-size:18px;">' + a.name + '</h2>' +
                '</div>' +
            '</div>' +
            sHtml +
            '<div class="info-box"><b>' + a.category + '</b><br><br>' + a.description + '</div>' +
            bHtml;
    }

    function renderList() {
        var cats = {};
        for (var i = 0; i < appsData.length; i++) { cats[appsData[i].category] = true; }
        
        var cHtml = '<option value="all">Все категории</option>';
        for (var k in cats) { cHtml += '<option value="' + k + '">' + k + '</option>'; }

        var html = '<div class="search-area">' +
            '<input type="text" id="sI" placeholder="Поиск..." onkeyup="doF()">' +
            '<select id="sC" onchange="doF()">' + cHtml + '</select>' +
            '</div><div id="lC" class="grid">';

        for (var i = 0; i < appsData.length; i++) {
            var item = appsData[i];
            html += '<a href="?app=' + item.id + '" class="app-item" data-cat="' + item.category + '">' +
                    '<img src="' + item.icon + '"><span>' + item.name + '</span></a>';
        }
        html += '</div>';
        root.innerHTML = html;
    }

    window.doF = function() {
        var q = document.getElementById('sI').value.toLowerCase();
        var c = document.getElementById('sC').value;
        var items = document.getElementsByClassName('app-item');
        for (var i = 0; i < items.length; i++) {
            var name = items[i].getElementsByTagName('span')[0].innerHTML.toLowerCase();
            var cat = items[i].getAttribute('data-cat');
            items[i].style.display = (name.indexOf(q) > -1 && (c == "all" || c == cat)) ? "inline-block" : "none";
        }
    };

    var current = getParam("app");
    if (current) renderDetails(current); else renderList();
