<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BB Chat Terminal</title>
    <style>
        /* Используем флоаты или абсолютное позиционирование вместо Flexbox (он глючит на OS 7) */
        body { background: #000; color: #eee; font-family: "Courier New", monospace; margin: 0; padding: 0; overflow: hidden; }
        #log { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 60px;
            overflow-y: scroll; padding: 10px; word-wrap: break-word;
            border-bottom: 1px solid #333;
        }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 4px; font-size: 16px; }
        .nick { color: #00AA00; font-weight: bold; }
        .input-area { 
            position: absolute; bottom: 0; left: 0; right: 0; height: 60px; 
            background: #111; display: block; padding: 5px;
        }
        input[type="text"] { 
            background: #222; border: 1px solid #444; color: #fff; 
            height: 40px; font-size: 18px; padding: 0 5px; width: 70%;
        }
        button { height: 42px; width: 25%; background: #333; color: #fff; border: 1px solid #555; vertical-align: top; }
    </style>
</head>
<body>

<div id="log">Загрузка истории...</div>

<div class="input-area">
    <input type="text" id="msgIn" placeholder="Текст...">
    <button onclick="send()">➔</button>
</div>

<script>
    var TOKEN = "8793448953:AAGiRZID46nM2NwQ2gKvMraY9sGG98VLnVo";
    var CHAT_ID = "-1003714052459";
    var lastUpdateId = 0;

    function getUpdates() {
        var xhr = new XMLHttpRequest();
        // Используем JSONP или просто GET. Штатный браузер BB хорошо ест обычный XHR.
        xhr.open("GET", "https://api.telegram.org/bot" + TOKEN + "/getUpdates?offset=" + (lastUpdateId + 1), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4 && xhr.status == 200) {
                var res = JSON.parse(xhr.responseText);
                if (res.ok && res.result.length > 0) {
                    for (var i = 0; i < res.result.length; i++) {
                        var up = res.result[i];
                        lastUpdateId = up.update_id;
                        var m = up.channel_post || up.message;
                        if (m && m.text) {
                            var div = document.createElement('div');
                            div.className = 'msg';
                            div.innerHTML = '<span class="nick">User:</span> ' + m.text;
                            document.getElementById('log').appendChild(div);
                        }
                    }
                    var l = document.getElementById('log');
                    l.scrollTop = l.scrollHeight;
                }
            }
        };
        xhr.send();
    }

    function send() {
        var txt = document.getElementById('msgIn').value;
        if (!txt) return;
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "https://api.telegram.org/bot" + TOKEN + "/sendMessage?chat_id=" + CHAT_ID + "&text=" + encodeURIComponent(txt), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4) {
                document.getElementById('msgIn').value = "";
                getUpdates();
            }
        };
        xhr.send();
    }

    // Автообновление каждые 5 секунд
    setInterval(getUpdates, 5000);
    getUpdates();
</script>
</body>
</html>
